<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Shield</title>
    <link rel="stylesheet" href="popup.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
                    <path d="M12 22V8"/>
                </svg>
                <span>Guardian Shield</span>
            </div>
            <div class="status-indicator" id="statusIndicator">
                <div class="status-dot"></div>
                <span id="statusText">Checking...</span>
            </div>
        </header>

        <!-- Current Tab Info -->
        <section class="tab-info">
            <h3>Current Page</h3>
            <div class="url-display" id="currentUrl">
                <span class="url-text">Loading...</span>
                <button class="copy-btn" id="copyUrl" title="Copy URL">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9"/>
                    </svg>
                </button>
            </div>
            <div class="site-status" id="siteStatus">
                <span class="status-badge">Checking...</span>
            </div>
        </section>

        <!-- Protection Status -->
        <section class="protection-status">
            <h3>Protection Status</h3>
            <div class="status-grid">
                <div class="status-item">
                    <div class="status-icon" id="contentFilterIcon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 4a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v2.586a1 1 0 0 1-.293.707l-6.414 6.414a1 1 0 0 0-.707 0l-6.414-6.414A1 1 0 0 1 3 6.586V4z"/>
                            <path d="M3 8l6.414 6.414A2 2 0 0 0 11.828 15H21a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H3z"/>
                        </svg>
                    </div>
                    <div class="status-details">
                        <div class="status-title">Content Filter</div>
                        <div class="status-desc" id="contentFilterStatus">Active</div>
                    </div>
                </div>
                <div class="status-item">
                    <div class="status-icon" id="monitoringIcon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8-4 8-11-8-11 8z"/>
                            <path d="M12 2v10"/>
                        </svg>
                    </div>
                    <div class="status-details">
                        <div class="status-title">Monitoring</div>
                        <div class="status-desc" id="monitoringStatus">Active</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Manual Alert -->
        <section class="manual-alert">
            <h3>Manual Alert</h3>
            <div class="alert-form">
                <input 
                    type="text" 
                    id="childName" 
                    placeholder="Child's name" 
                    class="form-input"
                    maxlength="50"
                >
                <textarea 
                    id="alertMessage" 
                    placeholder="Describe the concern..." 
                    class="form-textarea"
                    maxlength="200"
                ></textarea>
                <button id="sendAlert" class="alert-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a6 6 0 0 0-6 6z"/>
                        <path d="M2 8v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/>
                    </svg>
                    Send Alert
                </button>
            </div>
        </section>

        <!-- Screenshot -->
        <section class="screenshot-section">
            <h3>Screenshot</h3>
            <button id="captureScreenshot" class="screenshot-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6a2 2 0 0 1 2 2h4a2 2 0 0 1 2 2v8z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
                Capture Screenshot
            </button>
            <div id="screenshotPreview" class="screenshot-preview hidden">
                <img id="screenshotImage" alt="Screenshot preview">
                <div class="screenshot-actions">
                    <button id="downloadScreenshot" class="download-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7,10 12,15 17,10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Download
                    </button>
                    <button id="sendScreenshot" class="send-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13"/>
                            <path d="M22 2l-7 20-4-18"/>
                        </svg>
                        Send Alert
                    </button>
                </div>
            </div>
        </section>

        <!-- Settings -->
        <section class="settings">
            <h3>Settings</h3>
            <div class="setting-item">
                <label class="setting-label">
                    <input type="checkbox" id="enableNotifications" checked>
                    <span class="checkmark"></span>
                    Enable Notifications
                </label>
            </div>
            <div class="setting-item">
                <label class="setting-label">
                    <input type="checkbox" id="enableScreenshots" checked>
                    <span class="checkmark"></span>
                    Auto Screenshots
                </label>
            </div>
            <div class="setting-item">
                <label class="setting-label">
                    <input type="checkbox" id="strictMode" checked>
                    <span class="checkmark"></span>
                    Strict Mode
                </label>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <div class="version">v1.0.0</div>
            <button id="openDashboard" class="dashboard-btn">
                Open Dashboard
            </button>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
